<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>鱼木拼豆 · 照片打印</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, "PingFang SC", sans-serif; background: #f5f5f5; min-height: 100vh; }

/* ── 顶栏 ── */
.nav { background: #07C160; height: 44px; display: flex; align-items: center; justify-content: center; position: sticky; top: 0; z-index: 99; }
.nav-title { color: #fff; font-size: 17px; font-weight: 600; }
.nav-back { position: absolute; left: 16px; color: #fff; font-size: 22px; cursor: pointer; padding: 4px 8px; display: none; }

/* ── 页面通用 ── */
.page { display: none; padding: 20px 16px 40px; }
.page.active { display: block; }

/* ── 首页 ── */
.hero { text-align: center; padding: 24px 0 20px; }
.hero-img { width: 160px; height: 160px; object-fit: contain; margin-bottom: 12px; }
.hero-title { font-size: 26px; font-weight: 700; color: #1a1a1a; }
.hero-sub { font-size: 14px; color: #666; margin-top: 6px; }

.price-card { background: #fff; border-radius: 16px; padding: 20px; text-align: center; margin: 16px 0; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
.price-label { font-size: 13px; color: #999; display: block; margin-bottom: 4px; }
.price-value { font-size: 40px; font-weight: 700; color: #07C160; display: block; }
.price-note  { font-size: 12px; color: #aaa; display: block; margin-top: 4px; }

.steps-card { background: #fff; border-radius: 16px; padding: 4px 16px; margin-bottom: 24px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
.step { display: flex; align-items: center; padding: 14px 0; border-bottom: 1px solid #f0f0f0; }
.step:last-child { border-bottom: none; }
.step-num { width: 26px; height: 26px; background: #07C160; color: #fff; border-radius: 50%; text-align: center; line-height: 26px; font-size: 13px; font-weight: 600; flex-shrink: 0; margin-right: 12px; }
.step-text { font-size: 15px; color: #333; }

/* ── 选照片页 ── */
.sec-title { font-size: 13px; color: #666; margin-bottom: 10px; }
.photo-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 16px; }
.photo-cell { aspect-ratio: 1; border-radius: 8px; overflow: hidden; position: relative; }
.photo-cell img { width: 100%; height: 100%; object-fit: cover; display: block; }
.photo-del { position: absolute; top: -6px; right: -6px; width: 22px; height: 22px; background: rgba(0,0,0,.6); color: #fff; border-radius: 50%; text-align: center; line-height: 22px; font-size: 16px; cursor: pointer; }
.add-cell { aspect-ratio: 1; border: 2px dashed #ccc; border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fff; cursor: pointer; }
.add-icon { font-size: 30px; color: #ccc; }
.add-label { font-size: 11px; color: #aaa; margin-top: 4px; }

.settings-card { background: #fff; border-radius: 16px; padding: 0 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
.setting-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid #f0f0f0; }
.setting-row:last-child { border-bottom: none; }
.setting-label { font-size: 15px; color: #333; }
.setting-val { font-size: 14px; color: #999; }
.counter { display: flex; align-items: center; gap: 12px; }
.counter-btn { width: 28px; height: 28px; background: #f0f0f0; border-radius: 50%; text-align: center; line-height: 28px; font-size: 20px; color: #333; cursor: pointer; user-select: none; border: none; }
.counter-val { font-size: 16px; min-width: 20px; text-align: center; font-weight: 600; }

.summary-row { display: flex; justify-content: flex-end; align-items: baseline; gap: 6px; margin-bottom: 80px; }
.summary-text  { font-size: 13px; color: #666; }
.summary-price { font-size: 24px; font-weight: 700; color: #FF4D4F; }

/* ── 支付页 ── */
.order-card { background: #fff; border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
.order-title { font-size: 16px; font-weight: 600; margin-bottom: 14px; }
.order-row { display: flex; justify-content: space-between; font-size: 14px; color: #666; padding: 9px 0; }
.order-row.total { font-size: 15px; font-weight: 600; color: #333; border-top: 1px solid #f0f0f0; margin-top: 4px; padding-top: 14px; }
.total-price { color: #FF4D4F; font-size: 22px; font-weight: 700; }

.qr-card { background: #fff; border-radius: 16px; padding: 20px; text-align: center; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
.qr-tip { font-size: 14px; color: #333; margin-bottom: 12px; font-weight: 600; }
.qr-img { width: 220px; height: 220px; object-fit: contain; border-radius: 8px; }
.qr-sub { font-size: 12px; color: #999; margin-top: 10px; }

/* ── 状态页 ── */
.status-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center; }
.big-spinner { width: 72px; height: 72px; border: 6px solid #eee; border-top-color: #07C160; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 24px; }
@keyframes spin { to { transform: rotate(360deg); } }
.icon-done { width: 72px; height: 72px; background: #07C160; border-radius: 50%; color: #fff; font-size: 40px; text-align: center; line-height: 72px; margin-bottom: 24px; animation: pop .4s cubic-bezier(.17,.67,.42,1.4); }
@keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
.icon-fail { width: 72px; height: 72px; background: #FF4D4F; border-radius: 50%; color: #fff; font-size: 40px; text-align: center; line-height: 72px; margin-bottom: 24px; }
.status-title { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; }
.status-desc  { font-size: 14px; color: #666; line-height: 1.7; margin-bottom: 32px; }
.order-id-tip { font-size: 11px; color: #ccc; margin-top: 20px; }

/* ── 底部按钮 ── */
.bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; padding: 12px 16px 28px; background: #f5f5f5; border-top: 1px solid #e8e8e8; }
.btn { width: 100%; height: 50px; border: none; border-radius: 8px; font-size: 17px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.btn-green { background: #07C160; color: #fff; }
.btn-green:disabled { background: #ccc; }
.btn-outline { background: #fff; color: #07C160; border: 1px solid #07C160; margin-top: 8px; }

/* Toast */
.toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(0,0,0,.75); color: #fff; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 999; pointer-events: none; opacity: 0; transition: opacity .2s; }
.toast.show { opacity: 1; }
</style>
</head>

<script>
const PRINTER = 'http://192.168.101.8:631/ipp/print';
const PRICE   = 1.00;

// ── 路由 ──────────────────────────────────────────────────
const pageHistory = ['index'];
const pageTitles  = { index:'鱼木拼豆', select:'选择照片', pay:'确认订单', status:'打印状态' };

function navigate(name) {
  pageHistory.push(name);
  showPage(name);
}
function goBack() {
  if (pageHistory.length <= 1) return;
  pageHistory.pop();
  showPage(pageHistory[pageHistory.length - 1]);
}
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('navTitle').textContent = pageTitles[name];
  document.getElementById('navBack').style.display = name === 'index' ? 'none' : '';
  window.scrollTo(0, 0);
}
function gotoIndex() {
  state.photos.forEach(p => URL.revokeObjectURL(p.url));
  Object.assign(state, { photos:[], copies:1 });
  renderGrid(); updateSummary();
  document.getElementById('copiesVal').textContent = '1';
  pageHistory.length = 0; pageHistory.push('index');
  showPage('index');
}

// ── 状态 ─────────────────────────────────────────────────
const state = { photos: [], copies: 1, imageBuffers: [] };

// ── 选照片 ───────────────────────────────────────────────
function pickPhoto() {
  if (state.photos.length >= 9) return;
  document.getElementById('fileInput').click();
}
function handleFiles(e) {
  const files = Array.from(e.target.files).slice(0, 9 - state.photos.length);
  e.target.value = '';
  files.forEach(f => state.photos.push({ url: URL.createObjectURL(f), file: f }));
  renderGrid(); updateSummary();
}
function removePhoto(i) {
  URL.revokeObjectURL(state.photos[i].url);
  state.photos.splice(i, 1);
  renderGrid(); updateSummary();
}
function renderGrid() {
  const grid = document.getElementById('photoGrid');
  grid.innerHTML = '';
  state.photos.forEach((p, i) => {
    const cell = document.createElement('div');
    cell.className = 'photo-cell';
    cell.innerHTML = `<img src="${p.url}"><div class="photo-del" onclick="removePhoto(${i})">×</div>`;
    grid.appendChild(cell);
  });
  if (state.photos.length < 9) {
    const add = document.createElement('div');
    add.className = 'add-cell';
    add.innerHTML = '<div class="add-icon">＋</div><div class="add-label">添加照片</div>';
    add.onclick = pickPhoto;
    grid.appendChild(add);
  }
  document.getElementById('selectTitle').textContent =
    `已选照片（${state.photos.length} 张，最多 9 张）`;
}
function changeCopies(d) {
  state.copies = Math.max(1, Math.min(10, state.copies + d));
  document.getElementById('copiesVal').textContent = state.copies;
  updateSummary();
}
function updateSummary() {
  const n = state.photos.length;
  const fee = (n * state.copies * PRICE).toFixed(2);
  const btn = document.getElementById('toPayBtn');
  btn.disabled = n === 0;
  const row = document.getElementById('summaryRow');
  if (n > 0) {
    row.style.display = 'flex';
    document.getElementById('summaryText').textContent = `共 ${n} 张 × ${state.copies} 份 =`;
    document.getElementById('summaryPrice').textContent = `¥${fee}`;
  } else {
    row.style.display = 'none';
  }
  // 更新支付页数据
  document.getElementById('payCount').textContent  = `${n} 张`;
  document.getElementById('payCopies').textContent = `${state.copies} 份`;
  document.getElementById('payTotal').textContent  = `¥${fee}`;
}

// ── IPP 打印 ──────────────────────────────────────────────
function compressImage(file) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      const MAX = 2000;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else       { w = Math.round(w * MAX / h); h = MAX; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      canvas.toBlob(blob => blob.arrayBuffer().then(resolve), 'image/jpeg', 0.85);
    };
    img.src = URL.createObjectURL(file);
  });
}

function buildIPP(jpegBuf) {
  const enc = new TextEncoder();
  function u8(v)  { return [v]; }
  function u16(v) { return [(v>>8)&0xff, v&0xff]; }
  function attr(tag, name, value) {
    const n = enc.encode(name), v = enc.encode(value);
    return [...u8(tag), ...u16(n.length), ...n, ...u16(v.length), ...v];
  }
  const hdr = [
    0x02, 0x00, 0x00, 0x02,       // IPP 2.0, Print-Job
    0x00, 0x00, 0x00, 0x01,       // request-id
    0x01,                          // operation-attributes
    ...attr(0x47, 'attributes-charset',          'utf-8'),
    ...attr(0x48, 'attributes-natural-language', 'zh-cn'),
    ...attr(0x45, 'printer-uri',                 PRINTER),
    ...attr(0x42, 'requesting-user-name',        'yumu-customer'),
    ...attr(0x42, 'job-name',                    'photo-print'),
    ...attr(0x49, 'document-format',             'image/jpeg'),
    0x03,                          // end-of-attributes
  ];
  const out = new Uint8Array(hdr.length + jpegBuf.byteLength);
  out.set(new Uint8Array(hdr), 0);
  out.set(new Uint8Array(jpegBuf), hdr.length);
  return out.buffer;
}

async function startPrint() {
  navigate('status');
  document.getElementById('statusPrinting').style.display = '';
  document.getElementById('statusDone').style.display     = 'none';
  document.getElementById('statusFail').style.display     = 'none';
  document.getElementById('statusOrderId').textContent =
    '订单号：YM' + Date.now();

  try {
    for (let i = 0; i < state.photos.length; i++) {
      for (let c = 0; c < state.copies; c++) {
        const buf = await compressImage(state.photos[i].file);
        await fetch(PRINTER, {
          method: 'POST',
          headers: { 'Content-Type': 'application/ipp' },
          body: buildIPP(buf),
          mode: 'no-cors',
        });
        // 每个任务间隔 800ms，避免打印机队列拥塞
        if (i + c > 0) await new Promise(r => setTimeout(r, 800));
      }
    }
    // 等打印机响应
    await new Promise(r => setTimeout(r, 2000));
    document.getElementById('statusPrinting').style.display = 'none';
    document.getElementById('statusDone').style.display     = 'flex';
  } catch(e) {
    document.getElementById('statusPrinting').style.display = 'none';
    document.getElementById('statusFail').style.display     = 'flex';
    document.getElementById('failMsg').textContent =
      '错误：' + e.message + '\n请确认已连接"鱼木拼豆"Wi-Fi';
  }
}

function retryPrint() {
  startPrint();
}

// ── Toast ─────────────────────────────────────────────────
let _tt;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(() => el.classList.remove('show'), 2000);
}
